name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync manifest version with tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json
          echo "manifest.json version set to $VERSION"

      - name: Package extension
        run: |
          zip -r ungoogled-chromium-updater.zip . \
            -x ".git/*" \
            -x ".git*" \
            -x ".github/*" \
            -x "*.md" \
            -x ".gitignore"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ungoogled-chromium-updater.zip
