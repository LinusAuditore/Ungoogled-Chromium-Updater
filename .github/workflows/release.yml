name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package extension
        run: |
          zip -r ungoogled-chromium-updater.zip . \
            -x ".git/*" \
            -x ".git*" \
            -x ".github/*" \
            -x "*.md" \
            -x ".gitignore"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ungoogled-chromium-updater.zip
